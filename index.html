<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Story — 원서 읽기 + 영어 공부</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

<!-- ===== Sidebar ===== -->
<nav class="sidebar">
  <div class="sidebar-head">E-Story</div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-view="bookshelf">
      <span class="ico">📚</span><span>내 서재</span>
    </div>
    <div class="nav-item" data-view="vocabulary">
      <span class="ico">📖</span><span>단어장</span>
    </div>
    <div class="nav-item" data-view="queue">
      <span class="ico">⏰</span><span>나중에 공부</span>
      <span id="queue-badge" style="display:none;margin-left:auto;background:var(--a3);color:#000;padding:0 6px;border-radius:8px;font-size:10px;font-weight:700"></span>
    </div>
    <div class="nav-item" data-view="history">
      <span class="ico">📝</span><span>피드백 이력</span>
    </div>
    <div class="nav-item" data-view="settings">
      <span class="ico">⚙️</span><span>설정</span>
    </div>
  </div>
  <div class="sidebar-foot" style="font-size:10px;color:var(--tx3);text-align:center">Story-first, Study-on-demand</div>
</nav>

<!-- ===== Main ===== -->
<div class="main">
  
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-title" id="topbar-title">📚 내 서재</div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="App.startReview()">🔄 복습</button>
    </div>
  </header>

  <!-- ===== Bookshelf Page ===== -->
  <div class="content active" id="bookshelf-page">
    <div class="bookshelf" id="bookshelf-grid">
      <div class="upload-area" id="upload-area">
        <div style="font-size:32px;margin-bottom:8px">📂</div>
        <div style="font-size:14px;margin-bottom:4px">txt 파일을 업로드하세요</div>
        <div style="font-size:12px">또는 여기로 드래그 & 드롭</div>
        <input type="file" id="file-input" accept=".txt">
      </div>
    </div>
  </div>

  <!-- ===== Reader Page ===== -->
  <div class="content" id="reader-page">
    <div class="reader-wrap" id="reader-wrap"></div>
  </div>

  <!-- ===== Vocabulary Page ===== -->
  <div class="content" id="vocabulary-page">
    <div class="vocab-header">
      <input type="text" id="vocab-search" placeholder="단어 검색..." oninput="App.renderVocabulary()">
      <select id="vocab-filter" onchange="App.renderVocabulary()">
        <option value="all">전체</option>
        <option value="new">🆕 새 단어</option>
        <option value="learning">📖 학습중</option>
        <option value="known">✅ 알고 있음</option>
      </select>
      <button class="btn" onclick="App.startReview()">🔄 복습 시작</button>
    </div>
    <div class="vocab-grid" id="vocab-grid"></div>
  </div>

  <!-- ===== Queue Page ===== -->
  <div class="content" id="queue-page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:16px;font-weight:600">⏰ 나중에 공부</h2>
      <button class="btn-s" id="queue-clear">모두 완료</button>
    </div>
    <div class="queue-list" id="queue-list"></div>
  </div>

  <!-- ===== History Page ===== -->
  <div class="content" id="history-page">
    <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">📝 피드백 이력</h2>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- ===== Settings Page ===== -->
  <div class="content" id="settings-page">
    <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">⚙️ 설정</h2>
    
    <div class="settings-group">
      <h3>🤖 AI 피드백 (BYOK)</h3>
      <div class="settings-row">
        <label>API URL</label>
        <input type="text" id="settings-url" placeholder="https://api.openai.com/v1">
      </div>
      <div class="settings-row">
        <label>모델</label>
        <input type="text" id="settings-model" placeholder="gpt-4o-mini">
      </div>
      <div class="settings-row">
        <label>API Key</label>
        <input type="password" id="settings-key" placeholder="sk-..." style="width:240px" autocomplete="off">
      </div>
      <div class="settings-row">
        <label>키 저장 방식</label>
        <select id="settings-key-mode">
          <option value="session">세션 전용 (안전)</option>
          <option value="persist">브라우저에 저장</option>
        </select>
      </div>
      <div class="settings-note">키를 입력하지 않으면 데모 모드로 동작합니다. OpenCode Zen, OpenAI, Claude 등 OpenAI 호환 API 사용 가능.</div>
    </div>

    <div class="settings-group">
      <h3>🔊 TTS</h3>
      <div class="settings-row">
        <label>읽기 속도</label>
        <input type="range" id="settings-tts-rate" min="0.3" max="2.0" step="0.1">
        <span class="val" id="settings-tts-val">0.9x</span>
      </div>
    </div>

    <div class="settings-group">
      <h3>📖 리더</h3>
      <div class="settings-row">
        <label>글자 크기</label>
        <input type="range" id="settings-fontsize" min="12" max="28" step="1">
        <span class="val" id="settings-fs-val">16px</span>
      </div>
    </div>

    <div class="settings-group">
      <h3>💾 백업</h3>
      <div style="display:flex;gap:8px">
        <button class="btn" id="export-btn">📤 내보내기</button>
        <button class="btn-s" id="import-btn">📥 가져오기</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
      <button class="btn-s" id="settings-test-ai" style="margin-top:8px">🔌 AI 연결 테스트</button>
      <button class="btn" id="settings-save" style="margin-top:8px">💾 설정 저장</button>
    </div>
  </div>
</div>
</div>

<!-- ===== Quick Menu Popup ===== -->
<div class="quick-menu" id="quick-menu"></div>

<!-- ===== Study Panel ===== -->
<div class="study-panel" id="study-panel">
  <div class="study-head">
    <h3>✍️ 해석 훈련</h3>
    <button class="close-btn" id="study-close">✕</button>
  </div>
  <div class="study-body" id="study-body">
    <div class="study-sentence" id="study-sentence"></div>
    <textarea class="study-input" id="study-user-input" placeholder="이 문장을 한국어로 해석해보세요..." rows="3"></textarea>
    <button class="study-submit" id="study-submit">✍️ 해석 제출</button>
    
    <div class="study-feedback" id="study-feedback"></div>
    
    <div class="compare-view" id="study-compare"></div>
    
    <div id="study-buddy" style="margin-top:16px"></div>
  </div>
</div>

<!-- ===== Toast Container ===== -->
<div class="toast-container" id="toast-container"></div>

<!-- ===== Scripts ===== -->
<script src="https://unpkg.com/dexie@3.2.6/dist/dexie.js"></script>
<script src="js/db.js"></script>
<script src="js/ai.js"></script>
<script src="js/tts.js"></script>
<script src="js/app.js"></script>

</body>
</html>
